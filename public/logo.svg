<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Square Container -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="#0a0a0c" stroke="url(#logoGradient)" stroke-width="8" filter="url(#glow)"/>
  
  <!-- Growth Bars -->
  <rect x="120" y="300" width="30" height="120" rx="4" fill="url(#logoGradient)" opacity="0.4" />
  <rect x="170" y="260" width="30" height="160" rx="4" fill="url(#logoGradient)" opacity="0.6" />
  <rect x="220" y="220" width="30" height="200" rx="4" fill="url(#logoGradient)" opacity="0.8" />
  <rect x="270" y="180" width="30" height="240" rx="4" fill="url(#logoGradient)" />
  
  <!-- Upward Arrow -->
  <path d="L120 380 L220 280 L280 320 L400 150 M370 150 L400 150 L400 180" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Neural Network Nodes -->
  <circle cx="200" cy="180" r="15" fill="white" />
  <circle cx="260" cy="140" r="20" fill="white" />
  <circle cx="320" cy="200" r="15" fill="white" />
  <circle cx="240" cy="220" r="12" fill="white" />
  
  <!-- Node Connections -->
  <line x1="200" y1="180" x2="260" y2="140" stroke="white" stroke-width="4" opacity="0.5" />
  <line x1="260" y1="140" x2="320" y2="200" stroke="white" stroke-width="4" opacity="0.5" />
  <line x1="200" y1="180" x2="240" y2="220" stroke="white" stroke-width="4" opacity="0.5" />
  <line x1="260" y1="140" x2="240" y2="220" stroke="white" stroke-width="4" opacity="0.5" />
  <line x1="320" y1="200" x2="240" y2="220" stroke="white" stroke-width="4" opacity="0.5" />
</svg>
